<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KivuStream | Admin Panel</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="navbar">

    <div class="logo">
        🎬 KivuStream Admin
    </div>

    <button onclick="logout()" class="btn">
        Logout
    </button>

</header>

<main class="admin-container">

<h1>Movie & Series Import</h1>

<!-- SEARCH -->

<div class="admin-card">

    <h2>Search TMDB</h2>

    <input
        id="tmdbSearchInput"
        type="text"
        placeholder="Search movie or series..."
    >

    <button
        id="searchBtn"
        class="btn btn-primary">

        <i class="fa fa-search"></i>

        Search

    </button>

</div>

<!-- RESULTS -->

<div
    id="tmdbResults"
    class="search-results">
</div>

<!-- PREVIEW -->

<div
    id="tmdbPreview"
    class="preview-card"
    style="display:none">

    <div class="preview-left">

        <img id="previewPoster">

    </div>

    <div class="preview-right">

        <h2 id="previewTitle"></h2>

        <p id="previewOverview"></p>

        <p id="previewInfo"></p>

        <hr>

        <label>Category</label>

        <select id="category">

            <option value="movie">
                Movie
            </option>

            <option value="series">
                Series
            </option>

        </select>

        <label>Translator</label>

        <input id="translator">

        <label>Country</label>

        <input id="country">

        <label>Quality</label>

        <select id="quality">

            <option>1080p</option>
            <option>720p</option>
            <option>480p</option>

        </select>

        <label>Worker URL</label>

        <input id="workerUrl">

        <label>Download Links (JSON)</label>

        <textarea
            id="downloadLinks"
            rows="6"
            placeholder='{"1080p":"https://...","720p":"https://..."}'>
        </textarea>

        <br>

        <label>

            <input
                type="checkbox"
                id="featured">

            Featured

        </label>

        <br><br>

        <button
            id="saveMovieBtn"
            class="btn btn-success">

            💾 Save To Supabase

        </button>

    </div>

</div>

<!-- YOUR LIBRARY -->

<section class="admin-library">

<h2>Your Uploaded Contents</h2>

<div id="movieList"></div>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>

</body>

</html>
