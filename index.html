<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <title>KivuStream | Unlimited Movies & TV Shows</title>

    <link rel="icon" href="assets/favicon.ico">

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- Navigation -->
    <div id="navbar"></div>

    <!-- Hero Section -->
 <header class="hero">

    <!-- Background -->
    <div id="heroBackdrop" class="hero-backdrop"></div>

    <!-- Overlay -->
    <div class="hero-overlay"></div>

    <!-- Content -->
    <div class="hero-content container">

        <span id="heroBadge" class="hero-badge">
            🔥 Featured Today
        </span>

        <h1 id="heroTitle"></h1>

        <div class="hero-meta">

            <span id="heroRating"></span>

            <span id="heroYear"></span>

            <span id="heroLanguage"></span>

        </div>

        <p id="heroOverview"></p>

        <div class="hero-buttons">

            <button id="watchNow" class="btn-primary">
                ▶ Watch Now
            </button>

            <button id="watchTrailer" class="btn-outline">
                🎬 Trailer
            </button>

        </div>

    </div>

</header>
    <!-- Trending Movies -->
    <section class="section">
        <div class="container">

            <h2 class="section-title">
                🔥 Trending Movies
            </h2>

            <div id="trendingMovies" class="movie-grid"></div>

        </div>
    </section>

    <!-- Popular TV Shows -->
    <section class="section">
        <div class="container">

            <h2 class="section-title">
                ⭐ Popular TV Shows
            </h2>

        </div>
    </section>
<section class="section">

    <div class="container">

        <h2 class="section-title">
            ⭐ Popular Movies
        </h2>

        <div id="popularMovies" class="movie-grid"></div>

    </div>

</section>

<section class="section">

    <div class="container">

        <h2 class="section-title">
            🏆 Top Rated
        </h2>

        <div id="topRatedMovies" class="movie-grid"></div>

    </div>

</section>

<section class="section">

    <div class="container">

        <h2 class="section-title">
            📺 Popular Series
        </h2>

        <div id="popularSeries" class="movie-grid"></div>

    </div>

</section>
    <!-- Footer -->
    <div id="footer"></div>

    <!-- JavaScript -->
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/user.js"></script>

<script src="js/app.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>

<!-- Page-specific scripts -->
<script src="js/home.js"></script>

</body>

</html>
