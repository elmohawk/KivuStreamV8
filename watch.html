<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KivuStream - Watch</title>

<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/watch.css">
<link rel="stylesheet" href="css/footer.css">

</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- ========================= -->
<!-- HERO -->
<!-- ========================= -->

<section id="watchHero" class="watch-hero">

<div class="hero-overlay"></div>

<div class="watch-container">

<div class="hero-poster">

<img
id="moviePoster"
src="assets/logo.png"
alt="Poster">

</div>

<div class="hero-content">

<div class="hero-badges">

<span id="qualityBadge">HD</span>

<span id="movieYear">2026</span>

<span id="movieStatus">Released</span>

</div>

<h1 id="movieTitle"></h1>

<div class="hero-meta">

<span id="movieCategory"></span>

<span id="movieRuntime"></span>

<span id="movieTranslator"></span>

</div>

<p id="movieDescription"></p>

<div class="hero-buttons">

<button id="watchBtn">
▶ Watch
</button>

<button id="downloadBtn">
⬇ Download
</button>

<button id="favoriteBtn">
❤ My List
</button>

<button id="shareBtn">
🔗 Share
</button>

</div>

</div>

</div>

</section>

<!-- ========================= -->
<!-- PLAYER -->
<!-- ========================= -->

<section class="player-section">

<div class="player-wrapper">

<video

id="player"

controls

playsinline

preload="metadata"

poster="">

</video>

<div class="player-controls">

<button id="theaterBtn">

🎬 Theater

</button>

<button id="pipBtn">

📺 PiP

</button>

<button id="fullscreenBtn">

⛶ Fullscreen

</button>

</div>

</div>

</section>

<!-- ========================= -->
<!-- DOWNLOADS -->
<!-- ========================= -->

<section class="download-section">

<h2>

Downloads

</h2>

<div id="downloadContainer">

</div>

</section>

<!-- ========================= -->
<!-- EPISODES -->
<!-- ========================= -->

<section
id="episodesSection"
class="episodes-section">

<h2>

Episodes

</h2>

<div
id="seasonTabs"
class="season-tabs">

</div>

<div
id="episodeGrid"
class="episode-grid">

</div>

</section>

<!-- ========================= -->
<!-- DETAILS -->
<!-- ========================= -->

<section class="details-section">

<h2>

Movie Details

</h2>

<div class="details-grid">

<div>

<strong>Genre</strong>

<p id="detailGenre"></p>

</div>

<div>

<strong>Country</strong>

<p id="detailCountry"></p>

</div>

<div>

<strong>Language</strong>

<p id="detailLanguage"></p>

</div>

<div>

<strong>Runtime</strong>

<p id="detailRuntime"></p>

</div>

<div>

<strong>Translator</strong>

<p id="detailTranslator"></p>

</div>

<div>

<strong>Views</strong>

<p id="detailViews"></p>

</div>

<div>

<strong>Likes</strong>

<p id="detailLikes"></p>

</div>

<div>

<strong>Release</strong>

<p id="detailRelease"></p>

</div>

</div>

</section>

<!-- ========================= -->
<!-- CAST -->
<!-- ========================= -->

<section class="cast-section">

<h2>

Cast

</h2>

<div
id="castSlider"
class="cast-slider">

</div>

</section>

<!-- ========================= -->
<!-- COMMENTS -->
<!-- ========================= -->

<section class="comments-section">

<h2>

Comments

</h2>

<div
id="commentsList">

</div>

<div class="comment-box">

<textarea

id="commentInput"

placeholder="Write a comment...">

</textarea>

<button
id="sendComment">

Post Comment

</button>

</div>

</section>

<!-- ========================= -->
<!-- RECOMMENDED -->
<!-- ========================= -->

<section class="recommended-section">

<h2>

Recommended

</h2>

<div
id="recommendedSlider"
class="movie-slider">

</div>

</section>

<!-- FOOTER -->

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/navbar.js"></script>
<script src="js/watch.js"></script>

</body>
</html>
